defaults:
  - model_checkpoint.yaml
  - model_summary.yaml
    # - rich_progress_bar.yaml
  - _self_
  - lr_logger.yaml

model_checkpoint:
  dirpath: ${paths.output_dir}/checkpoints
  filename: "epoch_{epoch:03d}"
  monitor: "val/selection_score"
  mode: "max"
  save_last: False
  save_top_k: 1
  auto_insert_metric_name: False

model_summary:
  max_depth: -1
