# @package _global_

# XD-Violence Final CoCoOp Configuration
# Based on xdviolence_dsf (standard training)

defaults:
  - override /data: xdviolence.yaml
  - override /model: cocoop_xdviolence.yaml
  - override /callbacks: default.yaml
  - override /trainer: gpu.yaml
  - override /logger: wandb.yaml
  - override /hydra: default.yaml

seed: 1024
exp_name: xdviolence_final_cocoop

hydra:
  run:
    dir: ${paths.log_dir}/${task_name}/runs/${exp_name}

data:
  batch_size: 16
  num_workers: 6

model:
  save_dir: ${paths.log_dir}/${task_name}/runs/${exp_name}

callbacks:
  early_stopping:
    monitor: "val/selection_score"
    patience: 10
    mode: "max"

logger:
  wandb:
    name: ${exp_name}

trainer:
  enable_checkpointing: true
  max_epochs: 20
